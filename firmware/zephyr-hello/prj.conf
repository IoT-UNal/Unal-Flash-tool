# UNAL Hello World — Zephyr Configuration

# GPIO for LED blink
CONFIG_GPIO=y

# Serial console output
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# Printk (lightweight print)
CONFIG_PRINTK=y

# System info
CONFIG_HEAP_MEM_POOL_SIZE=4096

# Logging subsystem
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Boot banner
CONFIG_BOOT_BANNER=y
