# UNAL RGB LED Firmware — Zephyr Configuration
# Target: ESP32-C6 Super Mini (WS2812B RGB LED on GPIO8)

# ──── Core ────
CONFIG_GPIO=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_PRINTK=y
CONFIG_BOOT_BANNER=y
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_MAIN_STACK_SIZE=8192

# ──── Logging ────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# ──── NVS / Flash (LED config storage) ────
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

