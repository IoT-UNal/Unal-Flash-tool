name: Build & Release Firmware

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio esptool

      - name: Build firmware
        run: pio run -d firmware/hello-world

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          BUILD=firmware/hello-world/.pio/build/esp32
          cp $BUILD/firmware.bin release-assets/esp32-hello-world.bin
          cp $BUILD/bootloader.bin release-assets/esp32-bootloader.bin 2>/dev/null || true
          cp $BUILD/partitions.bin release-assets/esp32-partitions.bin 2>/dev/null || true

      - name: Create merged binary
        run: |
          BUILD=firmware/hello-world/.pio/build/esp32
          esptool.py --chip esp32 merge_bin \
            -o release-assets/esp32-hello-world-merged.bin \
            --flash_mode dio \
            --flash_freq 40m \
            --flash_size 4MB \
            0x1000 $BUILD/bootloader.bin \
            0x8000 $BUILD/partitions.bin \
            0x10000 $BUILD/firmware.bin

      - name: Create firmware manifest
        run: |
          cat > release-assets/firmware-manifest.json << 'EOF'
          {
            "name": "UNAL Hello World",
            "version": "${{ github.ref_name }}",
            "description": "Test firmware for UNAL Flash Tool — blinks LED and prints to serial",
            "targets": [
              {
                "chipFamily": "ESP32",
                "segments": [
                  { "name": "merged (recommended)", "file": "esp32-hello-world-merged.bin", "offset": "0x0" },
                  { "name": "application", "file": "esp32-hello-world.bin", "offset": "0x10000" },
                  { "name": "bootloader", "file": "esp32-bootloader.bin", "offset": "0x1000" },
                  { "name": "partitions", "file": "esp32-partitions.bin", "offset": "0x8000" }
                ]
              }
            ]
          }
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Firmware ${{ github.ref_name }}"
          body: |
            ## UNAL Flash Tool — Hello World Firmware ${{ github.ref_name }}

            Test firmware para verificar la plataforma de flasheo.

            **Archivos:**
            - `esp32-hello-world-merged.bin` — **Binario unificado (recomendado)** — se flashea en offset `0x0`
            - `esp32-hello-world.bin` — Solo aplicación (offset `0x10000`)
            - `esp32-bootloader.bin` — Bootloader (offset `0x1000`)
            - `esp32-partitions.bin` — Tabla de particiones (offset `0x8000`)

            **Funcionalidades:**
            - Parpadea LED integrado (GPIO 2)
            - Imprime info del chip por serial (115200 baud)
            - Heartbeat cada segundo

            **Cómo flashear:**
            1. Abre http://localhost:3000/flash
            2. Selecciona este release → elige `esp32-hello-world-merged.bin`
            3. Conecta y flashea tu ESP32
          files: release-assets/*
          generate_release_notes: true
