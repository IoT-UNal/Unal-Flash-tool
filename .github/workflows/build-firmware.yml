name: Build & Release Firmware

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install west and dependencies
        run: |
          pip install west

      - name: Initialize Zephyr workspace
        run: |
          cd /tmp
          west init zephyrproject --mr v4.1.0
          cd zephyrproject
          west update --narrow -o=--depth=1

      - name: Install Zephyr SDK
        run: |
          cd /tmp/zephyrproject
          west sdk install -t riscv64-zephyr-elf

      - name: Install Python requirements
        run: pip install -r /tmp/zephyrproject/zephyr/scripts/requirements.txt

      - name: Build firmware (XIAO ESP32-C6)
        run: |
          export ZEPHYR_BASE=/tmp/zephyrproject/zephyr
          cd /tmp/zephyrproject
          west build -b xiao_esp32c6/esp32c6/hpcore \
            $GITHUB_WORKSPACE/firmware/zephyr-hello \
            -d $GITHUB_WORKSPACE/firmware/zephyr-hello/build

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          BUILD_DIR=$GITHUB_WORKSPACE/firmware/zephyr-hello/build/zephyr
          cp $BUILD_DIR/zephyr.bin release-assets/esp32c6-xiao-zephyr.bin

      - name: Create firmware manifest
        run: |
          cat > release-assets/firmware-manifest.json << 'EOF'
          {
            "name": "UNAL Hello World (Zephyr)",
            "version": "${{ github.ref_name }}",
            "description": "Zephyr RTOS firmware — blinks LED and prints heartbeat via UART",
            "targets": [
              {
                "chipFamily": "ESP32-C6",
                "segments": [
                  { "name": "firmware", "file": "esp32c6-xiao-zephyr.bin", "offset": "0x0" }
                ]
              }
            ]
          }
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Firmware ${{ github.ref_name }}"
          body: |
            ## UNAL Flash Tool — Zephyr Firmware ${{ github.ref_name }}

            Firmware compilado con **Zephyr RTOS** para XIAO ESP32-C6.

            ### ESP32-C6 XIAO (seeed_xiao_esp32c6)
            - `esp32c6-xiao-zephyr.bin` — **Binario único** — offset `0x0`

            **Funcionalidades:**
            - Parpadea LED integrado (GPIO 15)
            - Imprime info del board y heartbeat por serial (115200 baud)
            - Heartbeat cada segundo con contador y uptime

            **Cómo flashear:**
            1. Abre http://localhost:3000/flash
            2. Selecciona este release → elige `esp32c6-xiao-zephyr.bin`
            3. Conecta tu XIAO ESP32-C6 y flashea a offset `0x0`
          files: release-assets/*
          generate_release_notes: true
