name: Build & Release Firmware

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      # --- Build scope ---
      build_ami_only:
        description: "Build only AMI LwM2M firmware (skip hello/wifi/rgb)"
        type: boolean
        default: true

      # --- Thread Network ---
      thread_channel:
        description: "Thread channel (11-26)"
        type: string
        default: "25"
      thread_pan_id:
        description: "Thread PAN ID (decimal, e.g. 9197 = 0x23ED)"
        type: string
        default: "9197"
      thread_network_key:
        description: "Thread Network Key (16 hex bytes, colon-separated)"
        type: string
        default: "5e:de:be:ad:64:40:5b:3e:17:19:36:46:c2:94:22:85"
      thread_network_name:
        description: "Thread Network Name (max 16 chars)"
        type: string
        default: "UNAL-Thread"
      thread_ext_pan_id:
        description: "Thread Extended PAN ID (8 hex bytes, colon-separated)"
        type: string
        default: "1a:25:78:dd:6e:e3:57:3b"

      # --- LwM2M / ThingsBoard ---
      lwm2m_server_primary:
        description: "Primary LwM2M server IPv6 (ThingsBoard Edge)"
        type: string
        default: "fd7d:f3c4:1736:1:89c1:9628:a3e4:f477"
      lwm2m_server_secondary:
        description: "Secondary LwM2M server IPv6 (failover, optional)"
        type: string
        default: "fdf5:bffd:bd6:ef74:b080:b8c3:367f:147f"

      # --- Meter ---
      single_phase:
        description: "Single-phase meter mode"
        type: boolean
        default: true
      demo_mode:
        description: "Demo mode (synthetic meter data, no physical meter)"
        type: boolean
        default: true

      # --- Board ---
      board_target:
        description: "Zephyr board target"
        type: choice
        options:
          - "xiao_esp32c6/esp32c6/hpcore"
          - "weact_esp32c6_mini/esp32c6/hpcore"
          - "esp32c6_devkitc/esp32c6/hpcore"
        default: "xiao_esp32c6/esp32c6/hpcore"

permissions:
  contents: write

env:
  ZEPHYR_VERSION: "v4.3.0"
  BOARD: ${{ github.event.inputs.board_target || 'xiao_esp32c6/esp32c6/hpcore' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install west and dependencies
        run: |
          pip install west patool "esptool>=5.0.2"

      - name: Initialize Zephyr workspace (${{ env.ZEPHYR_VERSION }})
        run: |
          cd /tmp
          west init zephyrproject --mr ${{ env.ZEPHYR_VERSION }}
          cd zephyrproject
          west update --narrow -o=--depth=1

      - name: Install Python requirements
        run: pip install -r /tmp/zephyrproject/zephyr/scripts/requirements.txt

      - name: Install Zephyr SDK
        run: |
          cd /tmp/zephyrproject
          west sdk install -t riscv64-zephyr-elf

      - name: Fetch Espressif binary blobs
        run: |
          cd /tmp/zephyrproject
          west blobs fetch hal_espressif

      # ── Optional firmware builds (skipped on workflow_dispatch with build_ami_only) ──

      - name: Build Hello World firmware (XIAO ESP32-C6)
        if: ${{ github.event_name == 'push' || inputs.build_ami_only == false }}
        run: |
          export ZEPHYR_BASE=/tmp/zephyrproject/zephyr
          cd /tmp/zephyrproject
          west build -b ${{ env.BOARD }} \
            $GITHUB_WORKSPACE/firmware/zephyr-hello \
            -d $GITHUB_WORKSPACE/firmware/zephyr-hello/build

      - name: Build WiFi firmware (XIAO ESP32-C6)
        if: ${{ github.event_name == 'push' || inputs.build_ami_only == false }}
        run: |
          export ZEPHYR_BASE=/tmp/zephyrproject/zephyr
          cd /tmp/zephyrproject
          west build -b ${{ env.BOARD }} \
            $GITHUB_WORKSPACE/firmware/zephyr-wifi \
            -d $GITHUB_WORKSPACE/firmware/zephyr-wifi/build

      - name: Build RGB WiFi firmware (ESP32-C6 Super Mini)
        if: ${{ github.event_name == 'push' || inputs.build_ami_only == false }}
        run: |
          export ZEPHYR_BASE=/tmp/zephyrproject/zephyr
          cd /tmp/zephyrproject
          west build -b ${{ env.BOARD }} \
            $GITHUB_WORKSPACE/firmware/zephyr-rgb \
            -d $GITHUB_WORKSPACE/firmware/zephyr-rgb/build

      # ── AMI LwM2M firmware (always built) ──

      - name: Patch AMI LwM2M source for Zephyr 4.3.0 compatibility
        run: |
          AMI_DIR=$GITHUB_WORKSPACE/firmware/ami-lwm2m-node
          # Remove Kconfig symbols incompatible with Zephyr 4.x / RISC-V
          sed -i \
            -e '/^CONFIG_FAULT_DUMP=/d' \
            -e '/^CONFIG_SHELL_BACKEND_SERIAL_TX_RING_BUFFER_SIZE=/d' \
            -e '/^CONFIG_LWM2M_MAX_NOTIFIED_NUMERICAL_RES_TRACKED=/d' \
            "$AMI_DIR/prj.conf"
          # Rename DTS overlay for Zephyr 4.3.0 qualified board name
          if [ -f "$AMI_DIR/boards/xiao_esp32c6_hpcore.overlay" ]; then
            mv "$AMI_DIR/boards/xiao_esp32c6_hpcore.overlay" "$AMI_DIR/boards/xiao_esp32c6_esp32c6_hpcore.overlay"
          fi
          # Fix OpenThread header includes
          find "$AMI_DIR/src" -name '*.c' -o -name '*.h' | xargs sed -i \
            's|#include <openthread\.h>|#include <zephyr/net/openthread.h>|g'

      - name: Generate AMI overlay from parameters
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          OVERLAY_FILE=$GITHUB_WORKSPACE/firmware/ami-lwm2m-node/overlay-ci.conf
          cat > "$OVERLAY_FILE" << 'EOF'
          # AMI LwM2M Node — CI/CD Custom Overlay
          # Generated by GitHub Actions workflow_dispatch
          EOF

          cat >> "$OVERLAY_FILE" << PARAMS
          # --- Thread Network Credentials ---
          CONFIG_OPENTHREAD_CHANNEL=${{ inputs.thread_channel }}
          CONFIG_OPENTHREAD_PANID=${{ inputs.thread_pan_id }}
          CONFIG_OPENTHREAD_NETWORKKEY="${{ inputs.thread_network_key }}"
          CONFIG_OPENTHREAD_NETWORK_NAME="${{ inputs.thread_network_name }}"
          CONFIG_OPENTHREAD_XPANID="${{ inputs.thread_ext_pan_id }}"

          # --- LwM2M Server ---
          CONFIG_NET_CONFIG_PEER_IPV6_ADDR="${{ inputs.lwm2m_server_primary }}"
          CONFIG_AMI_LWM2M_SERVER_IPV6_PRIMARY="${{ inputs.lwm2m_server_primary }}"
          CONFIG_AMI_LWM2M_SERVER_IPV6_SECONDARY="${{ inputs.lwm2m_server_secondary }}"

          # --- AMI Application ---
          CONFIG_AMI_SINGLE_PHASE=${{ inputs.single_phase == true && 'y' || 'n' }}
          CONFIG_AMI_DEMO_MODE=${{ inputs.demo_mode == true && 'y' || 'n' }}
          PARAMS

          echo "=== Generated overlay ==="
          cat "$OVERLAY_FILE"

      - name: Build AMI LwM2M firmware (ESP32-C6 Super Mini)
        run: |
          export ZEPHYR_BASE=/tmp/zephyrproject/zephyr
          cd /tmp/zephyrproject

          OVERLAY_FILE=$GITHUB_WORKSPACE/firmware/ami-lwm2m-node/overlay-ci.conf
          EXTRA_ARGS=""
          if [ -f "$OVERLAY_FILE" ]; then
            EXTRA_ARGS="-- -DEXTRA_CONF_FILE=$OVERLAY_FILE"
            echo "Using custom overlay: $OVERLAY_FILE"
          fi

          west build -b ${{ env.BOARD }} \
            $GITHUB_WORKSPACE/firmware/ami-lwm2m-node \
            -d $GITHUB_WORKSPACE/firmware/ami-lwm2m-node/build \
            $EXTRA_ARGS

      # ── Artifacts (always available, even on dispatch) ──

      - name: Upload AMI firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ami-lwm2m-firmware
          path: firmware/ami-lwm2m-node/build/zephyr/zephyr.bin
          retention-days: 90
          if-no-files-found: error

      - name: Upload AMI overlay (if custom)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: ami-lwm2m-overlay
          path: firmware/ami-lwm2m-node/overlay-ci.conf
          retention-days: 90

      # ── Release (only on tag push) ──

      - name: Prepare release assets
        if: ${{ github.event_name == 'push' }}
        run: |
          mkdir -p release-assets
          HELLO_DIR=$GITHUB_WORKSPACE/firmware/zephyr-hello/build/zephyr
          WIFI_DIR=$GITHUB_WORKSPACE/firmware/zephyr-wifi/build/zephyr
          RGB_DIR=$GITHUB_WORKSPACE/firmware/zephyr-rgb/build/zephyr
          AMI_DIR=$GITHUB_WORKSPACE/firmware/ami-lwm2m-node/build/zephyr
          cp $HELLO_DIR/zephyr.bin release-assets/esp32c6-xiao-zephyr-merged.bin
          cp $WIFI_DIR/zephyr.bin release-assets/esp32c6-xiao-wifi-merged.bin
          cp $RGB_DIR/zephyr.bin release-assets/esp32c6-supermini-rgb-wifi-merged.bin
          cp $AMI_DIR/zephyr.bin release-assets/esp32c6-supermini-ami-lwm2m-merged.bin

      - name: Generate default device config binary
        if: ${{ github.event_name == 'push' }}
        run: node $GITHUB_WORKSPACE/scripts/generate-device-config.mjs release-assets/device-config-default.bin

      - name: Create firmware manifest
        if: ${{ github.event_name == 'push' }}
        run: |
          cat > release-assets/firmware-manifest.json << 'MANIFEST'
          {
            "name": "UNAL Firmware Collection (Zephyr)",
            "version": "${{ github.ref_name }}",
            "description": "Zephyr RTOS firmware for ESP32-C6 boards",
            "targets": [
              {
                "chipFamily": "ESP32-C6",
                "segments": [
                  { "name": "hello-world", "file": "esp32c6-xiao-zephyr-merged.bin", "offset": "0x0" },
                  { "name": "wifi", "file": "esp32c6-xiao-wifi-merged.bin", "offset": "0x0" },
                  { "name": "rgb-wifi", "file": "esp32c6-supermini-rgb-wifi-merged.bin", "offset": "0x0" },
                  { "name": "ami-lwm2m", "file": "esp32c6-supermini-ami-lwm2m-merged.bin", "offset": "0x0" },
                  { "name": "device-config", "file": "device-config-default.bin", "offset": "0x3E0000" }
                ]
              }
            ]
          }
          MANIFEST

      - name: Create Release
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          name: "Firmware ${{ github.ref_name }}"
          body: |
            ## UNAL Flash Tool — Zephyr Firmware ${{ github.ref_name }}

            Firmware compilado con **Zephyr RTOS** para ESP32-C6.

            ### ESP32-C6 XIAO (seeed_xiao_esp32c6)

            #### Hello World
            - `esp32c6-xiao-zephyr-merged.bin` — **Binario único (bootloader + app)** — offset `0x0`
            - LED blink (GPIO 15) + heartbeat serial (115200 baud)

            #### WiFi (con config partition)
            - `esp32c6-xiao-wifi-merged.bin` — **Binario único (bootloader + app)** — offset `0x0`
            - Conexión WiFi STA con credenciales desde config partition o NVS (fallback)
            - LED indica estado: rápido=sin credenciales, medio=conectando, lento=conectado

            ### ESP32-C6 Super Mini

            #### RGB WiFi (con config partition)
            - `esp32c6-supermini-rgb-wifi-merged.bin` — **Binario único (bootloader + app)** — offset `0x0`
            - `device-config-default.bin` — **Config por defecto (vacía)** — offset `0x3E0000`
            - WiFi STA + LED RGB WS2812B configurable (solid, blink, breathe, rainbow, wifi_status)
            - Config partition de 192 bytes: WiFi (0-127) + LED (128-191)

            #### AMI LwM2M (Thread/OpenThread)
            - `esp32c6-supermini-ami-lwm2m-merged.bin` — **Binario único (bootloader + app)** — offset `0x0`
            - Nodo AMI smart meter con LwM2M sobre Thread (IEEE 802.15.4)
            - Lectura de medidor trifásico vía RS-485 Modbus (Object 10242)
            - Conectividad OpenThread con ThingsBoard Edge como servidor LwM2M
            - Configuración build-time via prj.conf overlay (usar wizard AMI en la web)

            **Config partition layout (0x3E0000):**
            | Offset | Tamaño | Contenido |
            |--------|--------|-----------|
            | 0x00   | 128 B  | WiFi config (magic `0x57494649`) |
            | 0x80   | 64 B   | LED config (magic `0x4C454443`) |

            **Cómo flashear:**
            1. Abre la web → pestaña Flash
            2. Selecciona este release → elige el firmware deseado
            3. Configura WiFi y/o LED RGB en el paso de configuración
            4. Conecta tu ESP32-C6 y flashea
          files: release-assets/*
          generate_release_notes: true
