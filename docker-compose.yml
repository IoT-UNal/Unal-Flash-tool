services:
  web:
    build: .
    image: unal-flash-tool-web:latest
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
    user: "0:0"
    volumes:
      - firmware-output:/app/firmware/ami-lwm2m-node/build/zephyr
      - firmware-overlays:/app/tmp/overlays
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.env:/app/.env:rw
    restart: unless-stopped

  firmware-builder:
    build:
      context: .
      dockerfile: Dockerfile.firmware
    image: unal-firmware-builder:latest
    volumes:
      - firmware-output:/output
      - firmware-overlays:/workspace/overlays
      - ccache:/workspace/ccache
    profiles:
      - build

volumes:
  firmware-output:
  firmware-overlays:
  ccache:
